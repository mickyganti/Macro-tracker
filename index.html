<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Checker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f2;
  --surface: #ffffff;
  --surface2: #f2f1ed;
  --border: #e8e6e0;
  --text: #1a1816;
  --text2: #8a8780;
  --text3: #b8b5b0;
  --green: #2a9d6e;
  --green-light: #e8f7f1;
  --orange: #e8622a;
  --orange-light: #fdf0ea;
  --amber: #c47d1a;
  --amber-light: #fdf4e3;
  --blue: #2e7fc1;
  --blue-light: #eaf3fb;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 430px; margin: 0 auto; }

.header { background: var(--surface); padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 10px; }
.header-icon { width: 34px; height: 34px; background: var(--text); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
.header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.header-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.date-badge { font-size: 12px; color: var(--text2); background: var(--surface2); padding: 5px 10px; border-radius: 20px; font-weight: 500; }

.macro-section { padding: 1.25rem 1.25rem 0.75rem; }
.calorie-hero { background: var(--surface); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow-sm); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.calorie-left { flex: 1; }
.calorie-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.calorie-num { font-size: 40px; font-weight: 300; letter-spacing: -2px; line-height: 1; margin: 4px 0 2px; }
.calorie-unit { font-size: 15px; font-weight: 400; color: var(--text2); letter-spacing: 0; }
.calorie-sub { font-size: 12px; color: var(--text2); }
.calorie-ring { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.calorie-ring svg { transform: rotate(-90deg); }
.ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }

.macros-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
.macro-pill-card { background: var(--surface); border-radius: var(--radius-sm); padding: 0.875rem 0.75rem; box-shadow: var(--shadow-sm); position: relative; overflow: hidden; }
.macro-pill-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.macro-pill-card.protein::before { background: var(--green); }
.macro-pill-card.carbs::before { background: var(--blue); }
.macro-pill-card.fat::before { background: var(--amber); }
.mpill-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; }
.mpill-val { font-size: 20px; font-weight: 500; letter-spacing: -0.5px; margin: 4px 0 1px; }
.mpill-val.protein { color: var(--green); }
.mpill-val.carbs { color: var(--blue); }
.mpill-val.fat { color: var(--amber); }
.mpill-val.over-text { color: var(--orange) !important; }
.mpill-unit { font-size: 12px; font-weight: 400; }
.mpill-sub { font-size: 11px; color: var(--text3); }
.mpill-bar { height: 3px; background: var(--surface2); border-radius: 3px; margin-top: 8px; overflow: hidden; }
.mpill-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.protein .mpill-fill { background: var(--green); }
.carbs .mpill-fill { background: var(--blue); }
.fat .mpill-fill { background: var(--amber); }

.check-section { padding: 0 1.25rem; margin-top: 0.25rem; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }

.photo-btn { width: 100%; padding: 1rem; border: 1.5px dashed var(--border); border-radius: var(--radius); background: var(--surface); cursor: pointer; display: flex; align-items: center; gap: 14px; transition: all 0.18s ease; text-align: left; }
.photo-btn:active { background: var(--surface2); border-color: var(--text3); transform: scale(0.99); }
.photo-icon-wrap { width: 42px; height: 42px; background: var(--surface2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.photo-btn-text { flex: 1; }
.photo-btn-title { font-size: 14px; font-weight: 500; color: var(--text); }
.photo-btn-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.photo-arrow { color: var(--text3); font-size: 20px; font-weight: 300; }

.or-divider { display: flex; align-items: center; gap: 10px; margin: 0.875rem 0; }
.or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.or-divider span { font-size: 12px; color: var(--text3); font-weight: 500; }

.text-row { display: flex; gap: 8px; }
.text-row input { flex: 1; padding: 13px 15px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.text-row input::placeholder { color: var(--text3); }
.text-row input:focus { border-color: var(--text); }
.text-row button { padding: 13px 18px; border: none; border-radius: var(--radius-sm); background: var(--text); color: #fff; font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.text-row button:active { transform: scale(0.97); background: #333; }

.preview-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius-sm); margin-top: 0.875rem; display: none; }

.loading-wrap { display: none; padding: 2rem 0; text-align: center; }
.loading-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
.loading-dots span { width: 7px; height: 7px; background: var(--text3); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.15s; }
.loading-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
.loading-text { font-size: 13px; color: var(--text2); }

.result-card { background: var(--surface); border-radius: var(--radius); margin-top: 0.875rem; overflow: hidden; display: none; box-shadow: var(--shadow); animation: slideUp 0.25s cubic-bezier(.4,0,.2,1); }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.verdict-banner { padding: 0.875rem 1.25rem; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
.verdict-banner.yes { background: var(--green-light); color: var(--green); }
.verdict-banner.no { background: var(--orange-light); color: var(--orange); }
.verdict-banner.maybe { background: var(--amber-light); color: var(--amber); }
.verdict-icon { font-size: 16px; }

.result-macros { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.rmacro { padding: 0.875rem 0.5rem; text-align: center; border-right: 1px solid var(--border); }
.rmacro:last-child { border-right: none; }
.rmacro-val { font-size: 18px; font-weight: 500; letter-spacing: -0.5px; }
.rmacro-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

.result-body { padding: 1rem 1.25rem; }
.result-summary { font-size: 13px; color: var(--text2); line-height: 1.65; }
.result-portion { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 8px; padding: 5px 9px; background: var(--surface2); border-radius: 6px; display: none; }

.log-meal-btn { width: 100%; padding: 14px; border: none; background: var(--text); color: #fff; font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.log-meal-btn:active { background: #333; }

.error-banner { display: none; background: var(--orange-light); border: 1px solid #fac9b0; border-radius: var(--radius-sm); padding: 0.75rem 1rem; font-size: 13px; color: var(--orange); margin-top: 0.75rem; }

.log-section { padding: 0 1.25rem; margin-top: 1.5rem; display: none; }
.log-list { display: flex; flex-direction: column; gap: 6px; }
.log-item { display: flex; align-items: center; background: var(--surface); border-radius: var(--radius-sm); padding: 11px 14px; box-shadow: var(--shadow-sm); gap: 10px; }
.log-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.log-name { flex: 1; font-size: 13px; font-weight: 500; }
.log-cals { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
.log-remove { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 17px; line-height: 1; padding: 2px 4px; border-radius: 4px; }

.bottom { padding: 1.5rem 1.25rem 3rem; text-align: center; }
.reset-btn { background: none; border: none; color: var(--text3); font-size: 12px; cursor: pointer; font-family: inherit; padding: 6px 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">🥗</div>
    <div>
      <div class="header-title">Macro Checker</div>
      <div class="header-sub">Track every meal</div>
    </div>
  </div>
  <div class="date-badge" id="dateBadge"></div>
</div>

<div class="macro-section">
  <div class="calorie-hero">
    <div class="calorie-left">
      <div class="calorie-label">Calories remaining</div>
      <div class="calorie-num" id="calNum">2010 <span class="calorie-unit">kcal</span></div>
      <div class="calorie-sub" id="calSub">of 2,010 today</div>
    </div>
    <div class="calorie-ring">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle cx="36" cy="36" r="30" fill="none" stroke="#e8e6e0" stroke-width="5"/>
        <circle id="ringArc" cx="36" cy="36" r="30" fill="none" stroke="#1a1816" stroke-width="5"
          stroke-dasharray="188.5" stroke-dashoffset="188.5" stroke-linecap="round"
          style="transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1), stroke 0.3s;"/>
      </svg>
      <div class="ring-pct" id="ringPct">0%</div>
    </div>
  </div>
  <div class="macros-row" id="macrosRow"></div>
</div>

<div class="check-section">
  <div class="section-label">Check a food</div>

  <button class="photo-btn" onclick="document.getElementById('fileInput').click()">
    <div class="photo-icon-wrap">📷</div>
    <div class="photo-btn-text">
      <div class="photo-btn-title">Take or upload a photo</div>
      <div class="photo-btn-sub">Point at any food — restaurant, meal, snack</div>
    </div>
    <div class="photo-arrow">›</div>
  </button>
  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)"/>

  <div class="or-divider"><span>or type it</span></div>

  <div class="text-row">
    <input type="text" id="foodText" placeholder="Big Mac, chicken wrap, 2 eggs on toast…"/>
    <button onclick="analyseText()">Check</button>
  </div>

  <img id="previewImg" class="preview-img"/>
  <div class="error-banner" id="errorBanner"></div>

  <div class="loading-wrap" id="loadingWrap">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <div class="loading-text" id="loadingText">Analysing…</div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="verdict-banner" id="verdictBanner">
      <span class="verdict-icon" id="verdictIcon"></span>
      <span id="verdictText"></span>
    </div>
    <div class="result-macros" id="resultMacros"></div>
    <div class="result-body">
      <div class="result-summary" id="resultSummary"></div>
      <div class="result-portion" id="resultPortion"></div>
    </div>
    <button class="log-meal-btn" onclick="logCurrentFood()">+ Log this meal</button>
  </div>
</div>

<div class="log-section" id="logSection">
  <div class="section-label">Today's meals</div>
  <div class="log-list" id="logList"></div>
</div>

<div class="bottom">
  <button class="reset-btn" onclick="resetDay()">Reset today's log</button>
</div>

<script>
const TARGETS = { cal: 2010, protein: 180, carbs: 165, fat: 70 };
let consumed = { cal: 0, protein: 0, carbs: 0, fat: 0 };
let log = [];
let pendingFood = null;

function init() {
  const now = new Date();
  document.getElementById('dateBadge').textContent = now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  const saved = localStorage.getItem('macro_log_today');
  if (saved && localStorage.getItem('macro_log_date') === now.toDateString()) {
    log = JSON.parse(saved);
    log.forEach(i => { consumed.cal += i.cal; consumed.protein += i.protein; consumed.carbs += i.carbs; consumed.fat += i.fat; });
  }
  renderMacros(); renderLog();
}

function renderMacros() {
  const calRem = TARGETS.cal - consumed.cal;
  const pct = Math.min(100, Math.round((consumed.cal / TARGETS.cal) * 100));
  const over = calRem < 0;
  const calEl = document.getElementById('calNum');
  calEl.innerHTML = (over ? '+' + Math.abs(calRem) : calRem) + ' <span class="calorie-unit">kcal' + (over ? ' over' : '') + '</span>';
  calEl.style.color = over ? 'var(--orange)' : 'var(--text)';
  document.getElementById('calSub').textContent = consumed.cal + ' of ' + TARGETS.cal.toLocaleString() + ' today';
  const arc = document.getElementById('ringArc');
  arc.style.strokeDashoffset = 188.5 - (pct / 100) * 188.5;
  arc.style.stroke = over ? 'var(--orange)' : 'var(--text)';
  document.getElementById('ringPct').textContent = pct + '%';

  const macros = [
    { key: 'protein', label: 'Protein', unit: 'g', cls: 'protein' },
    { key: 'carbs',   label: 'Carbs',   unit: 'g', cls: 'carbs' },
    { key: 'fat',     label: 'Fat',     unit: 'g', cls: 'fat' },
  ];
  document.getElementById('macrosRow').innerHTML = macros.map(m => {
    const rem = TARGETS[m.key] - consumed[m.key];
    const p = Math.min(100, Math.round((consumed[m.key] / TARGETS[m.key]) * 100));
    const ov = rem < 0;
    return `<div class="macro-pill-card ${m.cls}">
      <div class="mpill-label">${m.label}</div>
      <div class="mpill-val ${m.cls}${ov ? ' over-text' : ''}">${ov ? '+' + Math.abs(rem) : rem}<span class="mpill-unit">${m.unit}</span></div>
      <div class="mpill-sub">${consumed[m.key]}/${TARGETS[m.key]}${m.unit}</div>
      <div class="mpill-bar"><div class="mpill-fill" style="width:${p}%"></div></div>
    </div>`;
  }).join('');
}

function renderLog() {
  const sec = document.getElementById('logSection');
  if (!log.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('logList').innerHTML = log.map((item, i) =>
    `<div class="log-item"><div class="log-dot"></div><div class="log-name">${item.name}</div><div class="log-cals">${item.cal} kcal</div><button class="log-remove" onclick="removeLog(${i})">×</button></div>`
  ).join('');
}

function removeLog(i) {
  const it = log[i];
  consumed.cal -= it.cal; consumed.protein -= it.protein; consumed.carbs -= it.carbs; consumed.fat -= it.fat;
  log.splice(i, 1); saveLog(); renderMacros(); renderLog();
}

function saveLog() {
  localStorage.setItem('macro_log_today', JSON.stringify(log));
  localStorage.setItem('macro_log_date', new Date().toDateString());
}

function showLoading(msg) {
  document.getElementById('loadingWrap').style.display = 'block';
  document.getElementById('loadingText').textContent = msg;
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('errorBanner').style.display = 'none';
}
function hideLoading() { document.getElementById('loadingWrap').style.display = 'none'; }
function showError(msg) { const b = document.getElementById('errorBanner'); b.textContent = msg; b.style.display = 'block'; }

async function analyseText() {
  const text = document.getElementById('foodText').value.trim();
  if (!text) return;
  document.getElementById('previewImg').style.display = 'none';
  showLoading('Checking that food…');
  await callClaude(null, text);
}

async function handlePhoto(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const img = document.getElementById('previewImg');
    img.src = e.target.result; img.style.display = 'block';
    showLoading('Analysing your photo…');
    await callClaude(e.target.result.split(',')[1], null);
  };
  reader.readAsDataURL(file);
}

async function callClaude(imageBase64, textDesc) {
  const rem = { cal: TARGETS.cal - consumed.cal, protein: TARGETS.protein - consumed.protein, carbs: TARGETS.carbs - consumed.carbs, fat: TARGETS.fat - consumed.fat };
  const sys = `You are a macro nutrition assistant. Daily targets: ${TARGETS.cal} cal, ${TARGETS.protein}g protein, ${TARGETS.carbs}g carbs, ${TARGETS.fat}g fat. Remaining today: ${rem.cal} cal, ${rem.protein}g protein, ${rem.carbs}g carbs, ${rem.fat}g fat. Respond ONLY with valid JSON, no markdown: {"name":"short food name","verdict":"yes|no|maybe","cal":number,"protein":number,"carbs":number,"fat":number,"summary":"2-3 direct sentences. Does it fit? What to watch. Smarter alternatives if not.","portion":"estimated portion size"}`;
  const content = imageBase64
    ? [{type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageBase64}},{type:"text",text:"Does this food fit my remaining macros today?"}]
    : [{type:"text",text:`Does this fit my remaining macros: ${textDesc}`}];
  try {
    const res = await fetch('/api/analyse', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ system: sys, content }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Something went wrong');
    const json = JSON.parse(data.result.replace(/```json|```/g,'').trim());
    hideLoading(); showResult(json);
  } catch(err) { hideLoading(); showError('Could not analyse — ' + err.message); }
}

function showResult(food) {
  pendingFood = food;
  const cfg = { yes:{icon:'✓',text:'Fits your macros',cls:'yes'}, no:{icon:'✗',text:"Doesn't fit today",cls:'no'}, maybe:{icon:'~',text:'Fits with adjustments',cls:'maybe'} }[food.verdict] || {icon:'~',text:'Check details',cls:'maybe'};
  const banner = document.getElementById('verdictBanner');
  banner.className = 'verdict-banner ' + cfg.cls;
  document.getElementById('verdictIcon').textContent = cfg.icon;
  document.getElementById('verdictText').textContent = cfg.text;
  document.getElementById('resultMacros').innerHTML = [
    {label:'Calories',val:food.cal,unit:''},{label:'Protein',val:food.protein,unit:'g'},{label:'Carbs',val:food.carbs,unit:'g'},{label:'Fat',val:food.fat,unit:'g'}
  ].map(m=>`<div class="rmacro"><div class="rmacro-val">${m.val}${m.unit}</div><div class="rmacro-lbl">${m.label}</div></div>`).join('');
  document.getElementById('resultSummary').textContent = food.summary;
  const portEl = document.getElementById('resultPortion');
  if (food.portion) { portEl.textContent = 'Est. portion: ' + food.portion; portEl.style.display = 'inline-block'; } else { portEl.style.display = 'none'; }
  document.getElementById('resultCard').style.display = 'block';
}

function logCurrentFood() {
  if (!pendingFood) return;
  log.push({name:pendingFood.name,cal:pendingFood.cal,protein:pendingFood.protein,carbs:pendingFood.carbs,fat:pendingFood.fat});
  consumed.cal+=pendingFood.cal; consumed.protein+=pendingFood.protein; consumed.carbs+=pendingFood.carbs; consumed.fat+=pendingFood.fat;
  pendingFood = null;
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('foodText').value = '';
  document.getElementById('fileInput').value = '';
  saveLog(); renderMacros(); renderLog();
}

function resetDay() {
  if (!confirm("Reset all of today's logged meals?")) return;
  log = []; consumed = {cal:0,protein:0,carbs:0,fat:0};
  localStorage.removeItem('macro_log_today'); localStorage.removeItem('macro_log_date');
  renderMacros(); renderLog();
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('previewImg').style.display = 'none';
}

init();
</script>
</body>
</html>
